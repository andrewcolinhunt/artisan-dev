ci:
  autoupdate_commit_msg: "chore: update pre-commit hooks"

repos:
  # Run Black on Python code blocks in documentation files.
  - repo: https://github.com/adamchainz/blacken-docs
    rev: "1.20.0"
    hooks:
      - id: blacken-docs
        additional_dependencies: [black==24.*]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-added-large-files # Prevent giant files from being committed.
      - id: check-case-conflict # Check for files with names that would conflict on a case-insensitive filesystem like MacOS HFS+ or Windows FAT.
      - id: check-merge-conflict # Check for files that contain merge conflict strings.
      - id: check-symlinks # Checks for symlinks which do not point to anything.
      - id: check-yaml # Attempts to load all yaml files to verify syntax.
      - id: debug-statements # Check for debugger imports
      - id: end-of-file-fixer # Makes sure files end in a newline and only a newline.
      - id: mixed-line-ending # Replaces or checks mixed line ending.
      - id: name-tests-test # verifies that test files are named correctly.
        args: ["--pytest-test-first"] # ensure tests match test_.*\.py
      - id: trailing-whitespace # Trims trailing whitespace.

  # A collection of fast, cheap, regex based pre-commit hooks.
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: "v1.10.0"
    hooks:
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: "v3.6.2"
    hooks:
      - id: prettier
        types_or: [yaml, markdown, json]
        args: [--prose-wrap=always]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.13.2"
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [python, pyi]
        args: ["--fix", "--show-fixes"]
      # Run the formatter.
      - id: ruff-format
        types_or: [python, pyi]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.18.2"
    hooks:
      - id: mypy
        files: src|tests
        args: []
        additional_dependencies:
          - pytest
          - pydantic
          - polars>=0.20.0
          - xxhash
          - deltalake>=0.14.0
          - rich
          - prefect>=3.6,<4.0
          - prefect-submitit>=0.1.4

  # Fix common misspellings in text files.
  - repo: https://github.com/codespell-project/codespell
    rev: "v2.4.1"
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: "v0.11.0.1"
    hooks:
      - id: shellcheck

  - repo: local
    hooks:
      - id: disallow-caps
        name: Disallow improper capitalization
        language: pygrep
        entry: PyBind|Numpy|Cmake|CCache|Github|PyTest
        exclude: .pre-commit-config.yaml

  # Automated checks on pyproject.toml powered by JSON Schema definitions
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: "v0.24.1"
    hooks:
      - id: validate-pyproject
        additional_dependencies: ["validate-pyproject-schema-store[all]"]

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: "0.34.0"
    hooks:
      - id: check-github-workflows
      - id: check-readthedocs

  # Review repos for compliance to the Scientific-Python development guidelines
  - repo: https://github.com/scientific-python/cookie
    rev: "2025.10.01"
    hooks:
      - id: sp-repo-review
