# .readthedocs.yaml
# Jupyter Book 2.x / MyST configuration

# Required
version: 2

# Set the OS and Python version
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
    nodejs: "20" # Required for Jupyter Book 2.x / MyST
  commands:
    - curl -fsSL https://pixi.sh/install.sh | bash
    - $HOME/.pixi/bin/pixi install --environment docs
    - $HOME/.pixi/bin/pixi run -e docs docs-build
    - mkdir -p _readthedocs/html
    - cp -r docs/_build/html/* _readthedocs/html/
